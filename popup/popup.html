<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptAssist</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        width: 280px; margin: 0; padding: 14px;
        font: 13px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
        background: Canvas; color: CanvasText;
      }
      h1 { margin: 0 0 10px; font-size: 14px; font-weight: 600; }
      .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; gap: 8px; }
      label { color: GrayText; flex: 0 0 auto; }
      select, button {
        font: inherit; padding: 6px 8px; border-radius: 6px;
        border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
        background: Canvas; color: CanvasText; cursor: pointer; flex: 1;
      }
      button.primary { background: #4f46e5; color: white; border-color: #4f46e5; }
      .footer { display: flex; gap: 6px; margin-top: 12px; }
      .hint { font-size: 11px; color: GrayText; margin-top: 8px; }
      kbd {
        background: color-mix(in srgb, CanvasText 8%, transparent);
        padding: 1px 5px; border-radius: 3px; font-size: 11px;
      }
      .warn {
        background: #fef3c7; color: #92400e; font-size: 11px;
        padding: 6px 8px; border-radius: 6px; margin: 6px 0;
      }
      @media (prefers-color-scheme: dark) {
        .warn { background: #422006; color: #fde68a; }
      }
    </style>
  </head>
  <body>
    <h1>PromptAssist</h1>
    <div class="row">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="api">API</option>
        <option value="chat">In this chat</option>
      </select>
    </div>
    <div class="row" id="row-model">
      <label for="apiModel">Model</label>
      <select id="apiModel"></select>
    </div>
    <div class="row">
      <label for="promptStyle">Style</label>
      <select id="promptStyle">
        <option value="auto">Auto</option>
        <option value="refine">Refine</option>
        <option value="structure">Structure</option>
      </select>
    </div>
    <div class="row">
      <label for="verbosity">Length</label>
      <select id="verbosity">
        <option value="concise">Concise</option>
        <option value="standard">Standard</option>
        <option value="detailed">Detailed</option>
      </select>
    </div>
    <div id="no-key-warn" class="warn" style="display:none;">
      No API key set. Open settings to add one.
    </div>
    <div class="footer">
      <button id="open-options" class="primary">All settings…</button>
    </div>
    <p class="hint">Shortcut: <kbd>⌘/Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>O</kbd> &nbsp;·&nbsp; Right-click the floating button for settings.</p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
