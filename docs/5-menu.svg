  <text x="416" y="172" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="11">Mode</text>
  <rect x="494" y="159" width="176" height="24" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
