  <text x="416" y="306" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="10.5">5h 12% (resets 2h 14m)  ·  7d 4% (resets 5d)</text>

  <line x1="398" y1="322" x2="688" y2="322" stroke="#2a2a2a" stroke-width="1"/>
