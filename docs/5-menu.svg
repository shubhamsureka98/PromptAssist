  <rect x="494" y="189" width="176" height="24" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="506" y="205" fill="#e5e7eb" font-family="-apple-system,sans-serif" font-size="11">Claude Haiku 4.5</text>
  <text x="658" y="205" fill="#6b7280" font-family="-apple-system,sans-serif" font-size="11">▾</text>

  <text x="416" y="232" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="11">Style</text>
  <rect x="494" y="219" width="176" height="24" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="506" y="235" fill="#e5e7eb" font-family="-apple-system,sans-serif" font-size="11">Auto</text>
