  <rect x="416" y="388" width="8" height="4" rx="2" fill="#4f46e5"/>

  <text x="510" y="510" text-anchor="middle" fill="#444" font-family="-apple-system,sans-serif" font-size="10">Live usage badge — always visible, no click needed</text>
