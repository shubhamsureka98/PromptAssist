  <circle cx="40" cy="21" r="5" fill="#ffbd2e"/>
  <circle cx="58" cy="21" r="5" fill="#28c840"/>
  <rect x="200" y="13" width="320" height="18" rx="9" fill="#2a2a2a"/>
  <text x="360" y="25" text-anchor="middle" fill="#666" font-family="-apple-system,sans-serif" font-size="11">claude.ai/new</text>
  <rect x="30" y="390" width="570" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="50" y="416" fill="#666" font-family="-apple-system,sans-serif" font-size="12">https://myproduct.com  Read this and build a plan, I will</text>
  <text x="50" y="434" fill="#666" font-family="-apple-system,sans-serif" font-size="12">add my inputs and then will create a final one pager</text>
  <circle cx="668" cy="430" r="20" fill="#4f46e5"/>
  <text x="668" y="437" text-anchor="middle" fill="white" font-family="-apple-system,sans-serif" font-size="16">✦</text>
  <rect x="120" y="48" width="520" height="330" rx="14" fill="#1c1c1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="120" y="48" width="520" height="3" rx="2" fill="#4f46e5"/>
  <rect x="476" y="56" width="152" height="20" rx="10" fill="#1e1b4b"/>
  <text x="552" y="70" text-anchor="middle" fill="#a5b4fc" font-family="-apple-system,sans-serif" font-size="10" font-weight="500">✦ PromptAssist</text>
  <rect x="136" y="80" width="488" height="168" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="152" y="102" fill="#c7d2fe" font-family="-apple-system,sans-serif" font-size="12" font-weight="500">**Role:** You are a strategic marketing consultant.</text>
  <text x="152" y="122" fill="#e5e7eb" font-family="-apple-system,sans-serif" font-size="12">**Task:** Analyze the product at https://myproduct.com</text>
  <text x="152" y="140" fill="#e5e7eb" font-family="-apple-system,sans-serif" font-size="12">and build a concise one-pager marketing plan.</text>
  <text x="152" y="162" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">**Output Format:**</text>
  <text x="152" y="180" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">- Executive summary (2–3 sentences)</text>
  <text x="152" y="198" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">- Key objectives and scope</text>
  <text x="152" y="218" fill="#6b7280" font-family="-apple-system,sans-serif" font-size="11" font-style="italic">- Milestones and timeline…</text>
  <text x="150" y="268" fill="#6b7280" font-family="-apple-system,sans-serif" font-size="11">› Show original</text>
  <text x="150" y="286" fill="#6b7280" font-family="-apple-system,sans-serif" font-size="11">› Not quite? Add more context</text>
  <line x1="120" y1="300" x2="640" y2="300" stroke="#2a2a2a" stroke-width="1"/>
  <text x="140" y="322" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">Regenerate</text>
  <text x="228" y="322" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">Settings</text>
  <text x="436" y="322" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">Cancel</text>
  <text x="494" y="322" fill="#9ca3af" font-family="-apple-system,sans-serif" font-size="12">Insert</text>
  <rect x="540" y="306" width="88" height="28" rx="7" fill="#4f46e5"/>
  <text x="584" y="325" text-anchor="middle" fill="white" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Replace</text>
